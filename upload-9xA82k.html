<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload</title>
</head>
<body style="font-family:sans-serif;padding:40px">

<h2>Upload Selfie</h2>

<input type="file" id="fileInput" accept="image/*">
<button onclick="upload()">Uploader</button>

<script>
const token = "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";
const repo = "meddyordinateur/selfieoftheday";
const path = "uploads/current.jpg";

async function upload() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return alert("Choisis une image.");

  const img = new Image();
  const reader = new FileReader();

  reader.onload = function(e) {
    img.src = e.target.result;
  };

  img.onload = async function() {

    // 🔲 1️⃣ calcul carré centré
    const size = Math.min(img.width, img.height);
    const sx = (img.width - size) / 2;
    const sy = (img.height - size) / 2;

    // 🔲 2️⃣ créer canvas carré
    const canvas = document.createElement("canvas");
    canvas.width = 1200;   // taille finale fixe (optionnel)
    canvas.height = 1200;

    const ctx = canvas.getContext("2d");

    ctx.drawImage(
      img,
      sx, sy, size, size,   // source recadrée
      0, 0, 1200, 1200      // destination redimensionnée
    );

    // 🔲 3️⃣ convertir en base64 JPG
    const base64 = canvas.toDataURL("image/jpeg", 0.9).split(',')[1];

    // 🔲 4️⃣ récupérer SHA actuel
    const getFile = await fetch(
      `https://api.github.com/repos/${repo}/contents/${path}`
    );
    const fileData = await getFile.json();
    const sha = fileData.sha;

    // 🔲 5️⃣ upload
    const response = await fetch(
      `https://api.github.com/repos/${repo}/contents/${path}`,
      {
        method: "PUT",
        headers: {
          "Authorization": "token " + token,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: "update selfie (auto square)",
          content: base64,
          sha: sha
        })
      }
    );

    if (response.ok) {
      alert("Selfie carré mis à jour !");
    } else {
      alert("Erreur upload");
    }
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
