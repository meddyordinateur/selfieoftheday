<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Upload Selfie</title>
</head>
<body style="font-family:sans-serif;padding:40px">

<h2>Upload Selfie</h2>

<input type="file" id="fileInput" accept="image/*">
<button onclick="upload()">Uploader</button>

<script>
const token = "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"; // ton token
const repo = "meddyordinateur/selfieoftheday";
const path = "uploads/current.jpg";

async function upload() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return alert("Choisis une image.");

  const reader = new FileReader();

  reader.onload = async function() {
    const base64 = reader.result.split(',')[1];

    // 1️⃣ récupérer le SHA actuel (si le fichier existe)
    let sha;
    const getFile = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`);
    if (getFile.ok) {
      const fileData = await getFile.json();
      sha = fileData.sha; // fichier existant
    } else {
      sha = undefined; // premier upload
    }

    // 2️⃣ envoyer le fichier (création ou mise à jour)
    const response = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
      method: "PUT",
      headers: {
        "Authorization": "token " + token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: sha ? "update selfie" : "add selfie",
        content: base64,
        ...(sha ? { sha } : {}) // inclut SHA seulement si défini
      })
    });

    if (response.ok) {
      alert("Selfie mis à jour !");
      // afficher l'image via raw.githubusercontent.com
      const imgUrl = `https://raw.githubusercontent.com/Tmeddyordinateur/selfieoftheday/main/${path}`;
      console.log("Lien direct :", imgUrl);
    } else {
      const err = await response.json();
      console.error(err);
      alert("Erreur lors de l'upload : " + (err.message || "inconnue"));
    }
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
