<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload</title>
</head>
<body style="font-family:sans-serif;padding:40px">

<h2>Upload Selfie</h2>

<input type="file" id="fileInput" accept="image/*">
<button onclick="upload()">Uploader</button>

<script>
const token = "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";
const repo = "Tmeddyordinateur/selfieoftheday";
const path = "uploads/current.jpg";

async function upload() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return alert("Choisis une image.");

  const reader = new FileReader();

  reader.onload = async function() {
    const base64 = reader.result.split(',')[1];

    // 1️⃣ récupérer le SHA actuel (obligatoire pour overwrite)
    const getFile = await fetch(
      `https://api.github.com/repos/${repo}/contents/${path}`
    );

    const fileData = await getFile.json();
    const sha = fileData.sha;

    // 2️⃣ envoyer update
    const response = await fetch(
      `https://api.github.com/repos/${repo}/contents/${path}`,
      {
        method: "PUT",
        headers: {
          "Authorization": "token " + token,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: "update selfie",
          content: base64,
          sha: sha
        })
      }
    );

    if (response.ok) {
      alert("Selfie mis à jour !");
    } else {
      alert("Erreur upload");
    }
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
